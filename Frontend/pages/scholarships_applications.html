<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarship Applications - Scholarship System</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .applications-container {
            max-width: 1200px;
            margin: 20px auto;
        }
        
        .page-header {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .scholarship-info h2 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .scholarship-info p {
            color: #667eea;
            font-weight: 600;
        }
        
        .summary-badge {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-box {
            text-align: center;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #2d3748;
        }
        
        .stat-label {
            color: #718096;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding-left: 45px;
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
        }
        
        .filter-select {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
        }
        
        .applications-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .applications-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .applications-table th {
            background: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            padding: 16px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .applications-table td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        
        .applications-table tr:hover {
            background: #f7fafc;
        }
        
        .applicant-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .applicant-avatar {
            width: 40px;
            height: 40px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .applicant-details {
            line-height: 1.4;
        }
        
        .applicant-name {
            font-weight: 600;
            color: #2d3748;
        }
        
        .applicant-email {
            font-size: 0.8rem;
            color: #718096;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fefcbf;
            color: #975a16;
        }
        
        .status-approved {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-rejected {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status-review {
            background: #bee3f8;
            color: #2c5282;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .risk-low {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .risk-medium {
            background: #fefcbf;
            color: #975a16;
        }
        
        .risk-high {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-icon-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        
        .view-btn {
            background: #667eea;
            color: white;
        }
        
        .view-btn:hover {
            background: #5a67d8;
        }
        
        .approve-btn {
            background: #48bb78;
            color: white;
        }
        
        .approve-btn:hover {
            background: #38a169;
        }
        
        .reject-btn {
            background: #f56565;
            color: white;
        }
        
        .reject-btn:hover {
            background: #e53e3e;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            padding: 20px;
        }
        
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .bulk-actions {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .checkbox-column {
            width: 30px;
        }
        
        .export-btn {
            background: #718096;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="applications-container">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-top">
                    <div class="scholarship-info">
                        <h2 id="scholarshipName">Government Merit Scholarship</h2>
                        <p>View and manage student applications</p>
                    </div>
                    <div>
                        <span class="summary-badge" id="totalApplications">24 Applications</span>
                        <button class="btn btn-secondary" onclick="goBack()" style="margin-left: 15px;">← Back</button>
                    </div>
                </div>
                
                <!-- Statistics -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number" id="statTotal">24</div>
                        <div class="stat-label">Total Applications</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statPending">12</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statApproved">8</div>
                        <div class="stat-label">Approved</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statRejected">4</div>
                        <div class="stat-label">Rejected</div>
                    </div>
                </div>
            </div>
            
            <!-- Filter Section -->
            <div class="filter-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by name, ID, or email..." onkeyup="filterApplications()">
                </div>
                <select class="filter-select" id="statusFilter" onchange="filterApplications()">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="review">Under Review</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
                <select class="filter-select" id="riskFilter" onchange="filterApplications()">
                    <option value="all">All Risk Levels</option>
                    <option value="low">Low Risk</option>
                    <option value="medium">Medium Risk</option>
                    <option value="high">High Risk</option>
                </select>
                <button class="export-btn" onclick="exportApplications()">📊 Export</button>
            </div>
            
            <!-- Bulk Actions -->
            <div class="bulk-actions">
                <input type="checkbox" id="selectAll" onchange="toggleAll()">
                <label for="selectAll">Select All</label>
                <button class="btn btn-primary" onclick="bulkApprove()" style="padding: 8px 16px;">✓ Approve Selected</button>
                <button class="btn btn-secondary" onclick="bulkReject()" style="padding: 8px 16px;">✗ Reject Selected</button>
                <span id="selectedCount" style="color: #718096;">0 selected</span>
            </div>
            
            <!-- Message Area -->
            <div id="messageContainer"></div>
            
            <!-- Applications Table -->
            <div class="applications-table">
                <table id="applicationsTable">
                    <thead>
                        <tr>
                            <th class="checkbox-column">
                                <input type="checkbox" disabled>
                            </th>
                            <th>Application ID</th>
                            <th>Student Name</th>
                            <th>Submission Date</th>
                            <th>Risk Score</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Filled by JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // Dummy applications data
        const applications = [
            {
                id: "APP001",
                studentName: "Rahul Sharma",
                studentEmail: "rahul.s@example.com",
                submissionDate: "2024-08-20",
                riskScore: 35,
                riskLevel: "low",
                status: "approved"
            },
            {
                id: "APP002",
                studentName: "Priya Patel",
                studentEmail: "priya.p@example.com",
                submissionDate: "2024-08-21",
                riskScore: 65,
                riskLevel: "medium",
                status: "pending"
            },
            {
                id: "APP003",
                studentName: "Amit Kumar",
                studentEmail: "amit.k@example.com",
                submissionDate: "2024-08-19",
                riskScore: 82,
                riskLevel: "high",
                status: "review"
            },
            {
                id: "APP004",
                studentName: "Sneha Reddy",
                studentEmail: "sneha.r@example.com",
                submissionDate: "2024-08-22",
                riskScore: 28,
                riskLevel: "low",
                status: "approved"
            },
            {
                id: "APP005",
                studentName: "Vikram Singh",
                studentEmail: "vikram.s@example.com",
                submissionDate: "2024-08-18",
                riskScore: 45,
                riskLevel: "low",
                status: "rejected"
            },
            {
                id: "APP006",
                studentName: "Anjali Desai",
                studentEmail: "anjali.d@example.com",
                submissionDate: "2024-08-21",
                riskScore: 72,
                riskLevel: "medium",
                status: "pending"
            },
            {
                id: "APP007",
                studentName: "Karthik Nair",
                studentEmail: "karthik.n@example.com",
                submissionDate: "2024-08-20",
                riskScore: 91,
                riskLevel: "high",
                status: "pending"
            },
            {
                id: "APP008",
                studentName: "Divya Menon",
                studentEmail: "divya.m@example.com",
                submissionDate: "2024-08-17",
                riskScore: 42,
                riskLevel: "low",
                status: "approved"
            },
            {
                id: "APP009",
                studentName: "Rohit Gupta",
                studentEmail: "rohit.g@example.com",
                submissionDate: "2024-08-23",
                riskScore: 55,
                riskLevel: "medium",
                status: "pending"
            },
            {
                id: "APP010",
                studentName: "Neha Sharma",
                studentEmail: "neha.s@example.com",
                submissionDate: "2024-08-16",
                riskScore: 88,
                riskLevel: "high",
                status: "review"
            }
        ];
        
        let currentFiltered = [...applications];
        let selectedApps = new Set();
        let currentPage = 1;
        const rowsPerPage = 5;
        
        // Load on page start
        window.onload = function() {
            // Get scholarship name from session if available
            const schName = sessionStorage.getItem('viewScholarshipName');
            if (schName) {
                document.getElementById('scholarshipName').textContent = schName;
            }
            
            displayApplications();
            updateStats();
        };
        
        // Display applications in table
        function displayApplications() {
            const tableBody = document.getElementById('tableBody');
            
            // Calculate pagination
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedApps = currentFiltered.slice(start, end);
            
            if (paginatedApps.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">No applications found</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            paginatedApps.forEach(app => {
                // Get initials for avatar
                const initials = app.studentName.split(' ').map(n => n[0]).join('');
                
                // Status class
                let statusClass = 'status-pending';
                let statusText = 'Pending';
                
                switch(app.status) {
                    case 'approved':
                        statusClass = 'status-approved';
                        statusText = 'Approved';
                        break;
                    case 'rejected':
                        statusClass = 'status-rejected';
                        statusText = 'Rejected';
                        break;
                    case 'review':
                        statusClass = 'status-review';
                        statusText = 'Under Review';
                        break;
                }
                
                // Risk class
                let riskClass = 'risk-low';
                if (app.riskLevel === 'medium') riskClass = 'risk-medium';
                else if (app.riskLevel === 'high') riskClass = 'risk-high';
                
                html += `
                    <tr>
                        <td class="checkbox-column">
                            <input type="checkbox" class="app-checkbox" value="${app.id}" onchange="updateSelected('${app.id}')" ${selectedApps.has(app.id) ? 'checked' : ''}>
                        </td>
                        <td><strong>${app.id}</strong></td>
                        <td>
                            <div class="applicant-info">
                                <div class="applicant-avatar">${initials}</div>
                                <div class="applicant-details">
                                    <div class="applicant-name">${app.studentName}</div>
                                    <div class="applicant-email">${app.studentEmail}</div>
                                </div>
                            </div>
                        </td>
                        <td>${formatDate(app.submissionDate)}</td>
                        <td><span class="risk-badge ${riskClass}">${app.riskScore}</span></td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-icon-btn view-btn" onclick="viewApplication('${app.id}')" title="View Details">👁️</button>
                                <button class="action-icon-btn approve-btn" onclick="updateStatus('${app.id}', 'approve')" title="Approve">✓</button>
                                <button class="action-icon-btn reject-btn" onclick="updateStatus('${app.id}', 'reject')" title="Reject">✗</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableBody.innerHTML = html;
            updatePagination();
            updateSelectedCount();
        }
        
        // Format date
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }
        
        // Update statistics
        function updateStats() {
            const total = applications.length;
            const pending = applications.filter(a => a.status === 'pending').length;
            const approved = applications.filter(a => a.status === 'approved').length;
            const rejected = applications.filter(a => a.status === 'rejected').length;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;
            document.getElementById('totalApplications').textContent = total + ' Applications';
        }
        
        // Filter applications
        function filterApplications() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const riskFilter = document.getElementById('riskFilter').value;
            
            currentFiltered = applications.filter(app => {
                // Status filter
                if (statusFilter !== 'all' && app.status !== statusFilter) {
                    return false;
                }
                
                // Risk filter
                if (riskFilter !== 'all' && app.riskLevel !== riskFilter) {
                    return false;
                }
                
                // Search filter
                if (searchTerm) {
                    return app.id.toLowerCase().includes(searchTerm) ||
                           app.studentName.toLowerCase().includes(searchTerm) ||
                           app.studentEmail.toLowerCase().includes(searchTerm);
                }
                
                return true;
            });
            
            currentPage = 1;
            selectedApps.clear();
            displayApplications();
        }
        
        // Update pagination
        function updatePagination() {
            const totalPages = Math.ceil(currentFiltered.length / rowsPerPage);
            const pagination = document.getElementById('pagination');
            
            let html = '';
            
            // Previous button
            html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>`;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            
            // Next button
            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
            
            pagination.innerHTML = html;
        }
        
        // Change page
        function changePage(page) {
            currentPage = page;
            displayApplications();
        }
        
        // View application details
        function viewApplication(appId) {
            sessionStorage.setItem('viewApplicationId', appId);
            window.location.href = 'review_application.html';
        }
        
        // Update application status
        function updateStatus(appId, action) {
            const app = applications.find(a => a.id === appId);
            if (app) {
                if (action === 'approve') {
                    app.status = 'approved';
                } else if (action === 'reject') {
                    app.status = 'rejected';
                }
                
                // Update filtered list
                currentFiltered = currentFiltered.map(a => a.id === appId ? app : a);
                
                // Show message
                document.getElementById('messageContainer').innerHTML = 
                    `<div class="success">Application ${appId} ${action === 'approve' ? 'approved' : 'rejected'} successfully</div>`;
                
                setTimeout(() => {
                    document.getElementById('messageContainer').innerHTML = '';
                }, 3000);
                
                displayApplications();
                updateStats();
            }
        }
        
        // Toggle all checkboxes
        function toggleAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.app-checkbox');
            
            if (selectAll.checked) {
                checkboxes.forEach(cb => {
                    cb.checked = true;
                    selectedApps.add(cb.value);
                });
            } else {
                checkboxes.forEach(cb => {
                    cb.checked = false;
                    selectedApps.delete(cb.value);
                });
            }
            
            updateSelectedCount();
        }
        
        // Update selected set
        function updateSelected(appId) {
            if (selectedApps.has(appId)) {
                selectedApps.delete(appId);
            } else {
                selectedApps.add(appId);
            }
            
            // Update select all checkbox
            const totalCheckboxes = document.querySelectorAll('.app-checkbox').length;
            const checkedCheckboxes = document.querySelectorAll('.app-checkbox:checked').length;
            document.getElementById('selectAll').checked = totalCheckboxes === checkedCheckboxes;
            
            updateSelectedCount();
        }
        
        // Update selected count display
        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedApps.size + ' selected';
        }
        
        // Bulk approve
        function bulkApprove() {
            if (selectedApps.size === 0) {
                alert('Please select at least one application');
                return;
            }
            
            selectedApps.forEach(appId => {
                const app = applications.find(a => a.id === appId);
                if (app) app.status = 'approved';
            });
            
            selectedApps.clear();
            document.getElementById('selectAll').checked = false;
            currentFiltered = [...applications];
            
            document.getElementById('messageContainer').innerHTML = 
                '<div class="success">Selected applications approved successfully</div>';
            
            setTimeout(() => {
                document.getElementById('messageContainer').innerHTML = '';
            }, 3000);
            
            displayApplications();
            updateStats();
        }
        
        // Bulk reject
        function bulkReject() {
            if (selectedApps.size === 0) {
                alert('Please select at least one application');
                return;
            }
            
            selectedApps.forEach(appId => {
                const app = applications.find(a => a.id === appId);
                if (app) app.status = 'rejected';
            });
            
            selectedApps.clear();
            document.getElementById('selectAll').checked = false;
            currentFiltered = [...applications];
            
            document.getElementById('messageContainer').innerHTML = 
                '<div class="success">Selected applications rejected successfully</div>';
            
            setTimeout(() => {
                document.getElementById('messageContainer').innerHTML = '';
            }, 3000);
            
            displayApplications();
            updateStats();
        }
        
        // Export applications
        function exportApplications() {
            document.getElementById('messageContainer').innerHTML = 
                '<div class="info">Exporting applications data... (Demo)</div>';
            
            setTimeout(() => {
                document.getElementById('messageContainer').innerHTML = 
                    '<div class="success">Applications exported successfully!</div>';
                
                setTimeout(() => {
                    document.getElementById('messageContainer').innerHTML = '';
                }, 3000);
            }, 1500);
        }
        
        // Go back
        function goBack() {
            window.location.href = 'manage_scholarships.html';
        }
    </script>
</body>
</html>
